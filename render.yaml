services:
  - type: web
    name: clearshare-api
    env: node
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm run db:init && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clearshare-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: clearshare-db
    databaseName: clearshare
    user: clearshare_user
    plan: free
